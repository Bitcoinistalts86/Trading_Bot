# docker-compose.yml — local full stack for the AI Trading platform.
# Brings up: Postgres, Redis, the auth service, the execution engine (paper mode),
# and the Next.js dashboard. One command:  docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: auth
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  auth_service:
    build: ./auth_service
    environment:
      DATABASE_URL: postgresql://trading:trading@db:5432/auth
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      CORS_ORIGINS: http://localhost:3000
      BOOTSTRAP_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpass}
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

  execution_engine:
    build:
      context: .
      dockerfile: execution_engine/Dockerfile
    environment:
      EXECUTION_MODE: paper          # paper | testnet | live (paper = no real orders)
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports: ["8080:8080"]
    depends_on: [redis]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_AUTH_URL: http://localhost:8000
        NEXT_PUBLIC_EXEC_URL: http://localhost:8080
    ports: ["3000:3000"]
    depends_on: [auth_service, execution_engine]

volumes:
  pgdata:
