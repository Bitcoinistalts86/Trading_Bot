<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6 p-4 glass rounded-xl">
        <h1 class="text-2xl font-bold text-blue-400">AI Trading Terminal</h1>
        <div class="flex items-center gap-4">
            <span id="status-indicator" class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                Connected
            </span>
            <button id="kill-switch-btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-bold transition">
                EMERGENCY KILL-SWITCH
            </button>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-6">
        <!-- Main Chart -->
        <div class="col-span-12 lg:col-span-8 glass rounded-xl p-4 h-[500px]" id="chart-container">
            <h2 class="text-lg font-semibold mb-2">Market Overview</h2>
            <div id="main-chart" class="w-full h-full"></div>
        </div>

        <!-- Order Ticket -->
        <div class="col-span-12 lg:col-span-4 glass rounded-xl p-6">
            <h2 class="text-lg font-semibold mb-4">Place Order</h2>
            <div class="flex flex-col gap-4">
                <div class="flex gap-2">
                    <button id="buy-btn" class="flex-1 bg-green-600 p-2 rounded-lg font-bold">BUY</button>
                    <button id="sell-btn" class="flex-1 bg-red-600 p-2 rounded-lg font-bold">SELL</button>
                </div>
                <input type="text" id="instrument" value="ETH/USDT" class="bg-slate-800 p-2 rounded-lg border border-slate-700" placeholder="Instrument">
                <input type="number" id="quantity" value="1.0" class="bg-slate-800 p-2 rounded-lg border border-slate-700" placeholder="Quantity">
                <input type="number" id="price" class="bg-slate-800 p-2 rounded-lg border border-slate-700" placeholder="Price (Limit only)">
                <select id="order-type" class="bg-slate-800 p-2 rounded-lg border border-slate-700">
                    <option value="MARKET">Market</option>
                    <option value="LIMIT">Limit</option>
                </select>
                <button id="submit-order" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition mt-2">
                    SUBMIT ORDER
                </button>
            </div>
        </div>

        <!-- Order Book & Positions -->
        <div class="col-span-12 lg:col-span-6 glass rounded-xl p-4">
            <h2 class="text-lg font-semibold mb-2">Order Book</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <h3 class="text-green-400 text-sm mb-1 font-bold">Bids</h3>
                    <ul id="bids-list" class="text-sm font-mono"></ul>
                </div>
                <div>
                    <h3 class="text-red-400 text-sm mb-1 font-bold">Asks</h3>
                    <ul id="asks-list" class="text-sm font-mono"></ul>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-6 glass rounded-xl p-4">
            <h2 class="text-lg font-semibold mb-2">Positions & Balance</h2>
            <div id="balance-info" class="mb-4 text-xl font-bold text-blue-300">
                USD: $0.00 | ETH: 0.00
            </div>
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-left border-b border-slate-700">
                        <th class="pb-2">Instrument</th>
                        <th class="pb-2">Side</th>
                        <th class="pb-2">Qty</th>
                        <th class="pb-2">Price</th>
                    </tr>
                </thead>
                <tbody id="positions-list">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>

        <!-- Logs -->
        <div class="col-span-12 glass rounded-xl p-4">
            <h2 class="text-lg font-semibold mb-2">Activity Logs</h2>
            <div id="logs" class="h-40 overflow-y-auto font-mono text-xs bg-black bg-opacity-30 p-2 rounded-lg">
                <div>[SYSTEM] Initializing terminal...</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
