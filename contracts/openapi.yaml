# OpenAPI Specification for the AI Trading & Arbitrage Platform

openapi: 3.0.0
info:
  title: AI Trading & Arbitrage Platform API
  version: 1.0.0
paths:
  /v1/signal:
    post:
      summary: Accepts a trading signal from a model.
      responses:
        '202':
          description: Signal accepted for processing.
  /v1/order:
    post:
      summary: Submits an order to the execution gateway.
      responses:
        '202':
          description: Order accepted for processing.
  /v1/kill-switch:
    post:
      summary: Activates the emergency kill-switch.
      responses:
        '200':
          description: Kill-switch activated.
