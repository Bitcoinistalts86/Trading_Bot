// Protobuf schema for the AI Trading & Arbitrage Platform

syntax = "proto3";

package trading;

import "google/protobuf/timestamp.proto";

// Enum for Order Side
enum Side {
  SIDE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
}

// Enum for Order Type
enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  MARKET = 1;
  LIMIT = 2;
}

// L2 Order Book Level
message OrderBookLevel {
  double price = 1;
  double quantity = 2;
}

// A complete L2 Order Book Snapshot
message OrderBook {
  string exchange = 1;
  string instrument = 2;
  google.protobuf.Timestamp timestamp = 3;
  repeated OrderBookLevel bids = 4;
  repeated OrderBookLevel asks = 5;
}

// A single market trade
message Trade {
  string exchange = 1;
  string instrument = 2;
  google.protobuf.Timestamp timestamp = 3;
  double price = 4;
  double quantity = 5;
  Side side = 6;
}

// A calculated feature vector
message Feature {
  string instrument = 1;
  google.protobuf.Timestamp timestamp = 2;
  double vwap_5m = 3;
  double orderflow_imbalance = 4;
  // ... other feature fields
}

// A trading signal generated by a model
message Signal {
  string strategy_id = 1;
  string instrument = 2;
  google.protobuf.Timestamp timestamp = 3;
  Side side = 4;
  double price_target = 5;
  double quantity = 6;
  OrderType order_type = 7;
}

// An order to be sent to an exchange
message Order {
  string order_id = 1;
  string client_order_id = 2;
  string exchange = 3;
  string instrument = 4;
  Side side = 5;
  double price = 6;
  double quantity = 7;
  OrderType type = 8;
  // ... other order fields
}

// The result of an order execution
message Execution {
  string execution_id = 1;
  string order_id = 2;
  string exchange = 3;
  string instrument = 4;
  google.protobuf.Timestamp timestamp = 5;
  double price = 6;
  double quantity = 7;
  double fees = 8;
  // ... other execution fields
}
