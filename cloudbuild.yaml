# Cloud Build pipeline: build connector images and deploy to Cloud Run, then run Terraform apply (optional step)
steps:
  - id: "Build binance connector"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}", "connectors/binance-connector"]

  - id: "Push binance image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}"]

  - id: "Build uniswap connector"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}", "connectors/uniswap-connector"]

  - id: "Push uniswap image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}"]

  - id: "Deploy binance to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - binance-connector
      - --image
      - ${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --service-account
      - ${_CONNECTORS_SA}

  - id: "Deploy uniswap to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - uniswap-connector
      - --image
      - ${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --service-account
      - ${_CONNECTORS_SA}

# Optional: terraform apply step (if you want Cloud Build to apply infra changes)
  - id: "Terraform apply"
    name: "hashicorp/terraform:light"
    entrypoint: "/bin/sh"
    args:
      - -c
      - |
        cd infra/terraform
        terraform init -input=false
        terraform apply -auto-approve -input=false

images:
  - ${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}
  - ${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}

substitutions:
  _ARTIFACT_REGISTRY_HOST: "us-central1-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}"
  _ARTIFACT_REPO: "${_ARTIFACT_REPOSITORY}"
  _REGION: "us-central1"
  _CONNECTORS_SA: "connectors-sa@${PROJECT_ID}.iam.gserviceaccount.com"
