# Cloud Build pipeline: build connector images, deploy to Cloud Run, and run Dataflow job
steps:
  # --- Binance Connector ---
  - id: "Build binance connector"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}", "connectors/binance-connector"]
  - id: "Push binance image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}"]
  - id: "Deploy binance to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - binance-connector
      - --image
      - "${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --service-account
      - "${_CONNECTORS_SA}"

  # --- Uniswap Connector ---
  - id: "Build uniswap connector"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}", "connectors/uniswap-connector"]
  - id: "Push uniswap image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}"]
  - id: "Deploy uniswap to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - uniswap-connector
      - --image
      - "${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --service-account
      - "${_CONNECTORS_SA}"

  # --- Dataflow Feature Engine ---
  - id: "Build Dataflow Template"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
    - "-c"
    - |
      pip install apache-beam[gcp] numpy python-dateutil
      python data_pipeline/feature_engine/main.py \
        --runner DataflowRunner \
        --project ${PROJECT_ID} \
        --region ${_DATAFLOW_REGION} \
        --temp_location gs://${_DATAFLOW_BUCKET}/temp \
        --template_location gs://${_DATAFLOW_BUCKET}/templates/feature_engine \
        --service_account_email ${_DATAFLOW_SA_EMAIL} \
        --input_subscription_binance "projects/${PROJECT_ID}/subscriptions/dataflow-market-binance-raw-sub" \
        --input_subscription_uniswap "projects/${PROJECT_ID}/subscriptions/dataflow-market-uniswap-raw-sub" \
        --output_topic "projects/${PROJECT_ID}/topics/features.realtime" \
        --output_table "${PROJECT_ID}:features.features_intraday" \
        --dead_letter_topic "projects/${PROJECT_ID}/topics/features.dead_letter"

  - id: "Launch Dataflow Job"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
    - dataflow
    - jobs
    - run
    - "feature-engine-main"
    - --gcs-location=gs://${_DATAFLOW_BUCKET}/templates/feature_engine
    - --region=${_DATAFLOW_REGION}
    - --service-account-email=${_DATAFLOW_SA_EMAIL}
    - --update
    - --parameters=input_subscription_binance=projects/${PROJECT_ID}/subscriptions/dataflow-market-binance-raw-sub,input_subscription_uniswap=projects/${PROJECT_ID}/subscriptions/dataflow-market-uniswap-raw-sub,output_topic=projects/${PROJECT_ID}/topics/features.realtime,output_table=${PROJECT_ID}:features.features_intraday,dead_letter_topic=projects/${PROJECT_ID}/topics/features.dead_letter

  # --- Model Training ---
  - id: "Build trainer image"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/trainer:${SHORT_SHA}", "model_pipeline/trainer"]
  - id: "Push trainer image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/trainer:${SHORT_SHA}"]

  # --- Model Serving Gateway (Image Build Only) ---
  - id: "Build model gateway image"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/model-gateway:latest", "model_gateway"]
  - id: "Push model gateway image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/model-gateway:latest"]

  # --- Retraining Trigger ---
  - id: "Build retraining trigger image"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/retraining-trigger:${SHORT_SHA}", "retraining_trigger"]
  - id: "Push retraining trigger image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/retraining-trigger:${SHORT_SHA}"]
  - id: "Deploy retraining trigger to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - retraining-trigger
      - --image
      - "${_ARTIFACT_REGISTRY_HOST}/retraining-trigger:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --service-account
      - "${_VERTEX_SA_EMAIL}"

  # --- Execution Engine ---
  - id: "Build execution engine image"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}", "execution_engine"]
  - id: "Push execution engine image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}"]
  - id: "Deploy execution engine to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - execution-engine
      - --image
      - "${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --service-account
      - "${_EXECUTION_SA_EMAIL}"
      - --set-env-vars
      - "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},REGION=${_REGION},REDIS_HOST=${_REDIS_HOST},MODEL_GATEWAY_URL=${_MODEL_GATEWAY_URL},SIGNAL_SUBSCRIPTION=projects/${PROJECT_ID}/subscriptions/signals.strategy,BQ_TABLE_ID=${PROJECT_ID}:features.trade_logs"

  # --- Vertex AI Pipeline ---
  - id: "Compile and Submit Vertex AI Pipeline"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
    - "-c"
    - |
      pip install kfp google-cloud-aiplatform google-cloud-pipeline-components
      python model_pipeline/pipelines/train_pipeline.py
      gcloud ai pipelines run "price-prediction-train-pipeline-${SHORT_SHA}" \
        --region ${_REGION} \
        --service-account ${_VERTEX_SA_EMAIL} \
        --pipeline-root "gs://${_MODELS_BUCKET}/pipeline_root" \
        --template-path train_pipeline.json \
        --parameter-values project=${PROJECT_ID},region=${_REGION},display_name="price-prediction-model",gcs_output_path="gs://${_MODELS_BUCKET}",training_container_uri="${_ARTIFACT_REGISTRY_HOST}/trainer:${SHORT_SHA}",table_name="features.features_intraday"

images:
  - "${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}"
  - "${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}"
  - "${_ARTIFACT_REGISTRY_HOST}/trainer:${SHORT_SHA}"
  - "${_ARTIFACT_REGISTRY_HOST}/model-gateway:latest"
  - "${_ARTIFACT_REGISTRY_HOST}/retraining-trigger:${SHORT_SHA}"
  - "${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}"

substitutions:
  _ARTIFACT_REGISTRY_HOST: "us-central1-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}"
  _ARTIFACT_REPO: "ai-trading-artifacts"
  _REGION: "us-central1"
  _DATAFLOW_REGION: "us-central1"
  _CONNECTORS_SA: "connectors-sa@${PROJECT_ID}.iam.gserviceaccount.com"
  _DATAFLOW_SA_EMAIL: "dataflow-feature-engine-sa@${PROJECT_ID}.iam.gserviceaccount.com"
  _VERTEX_SA_EMAIL: "vertex-pipelines-sa@${PROJECT_ID}.iam.gserviceaccount.com"
  _MODELS_BUCKET: "${PROJECT_ID}-models"
  _BINANCE_INSTRUMENT: "btcusdt"
  _UNISWAP_PAIR_ID: "0xcbcdf9626bc03e24f779434178a73a0b4bad62ed"
  _EXECUTION_SA_EMAIL: "execution-engine-sa@${PROJECT_ID}.iam.gserviceaccount.com"
  _REDIS_HOST: "your-redis-host" # This needs to be manually updated after Redis is created
  _MODEL_GATEWAY_URL: "https://model-gateway-your-url.a.run.app" # Update with the gateway URL

options:
  logging: CLOUD_LOGGING_ONLY
