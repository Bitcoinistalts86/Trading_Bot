steps:
  - name: gcr.io/cloud-builders/docker
    args: [
      "build",
      "-t",
      "$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA",
      "./portfolio_engine"
    ]

  - name: gcr.io/cloud-builders/docker
    args: [
      "push",
      "$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA"
    ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      "run",
      "deploy",
      "portfolio-engine",
      "--image=$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA",
      "--region=$REGION",
      "--platform=managed"
    ]

  - id: "Build execution engine image"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}", "execution_engine"]
  - id: "Push execution engine image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}"]

  - id: "Deploy execution engine to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - execution-engine
      - --image
      - ${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --service-account
      - ${_CONNECTORS_SA}

images:
  - ${_ARTIFACT_REGISTRY_HOST}/binance-connector:${SHORT_SHA}
  - ${_ARTIFACT_REGISTRY_HOST}/uniswap-connector:${SHORT_SHA}
  - ${_ARTIFACT_REGISTRY_HOST}/feature-pipeline:${SHORT_SHA}
  - ${_ARTIFACT_REGISTRY_HOST}/retraining-trigger:${SHORT_SHA}
  - ${_ARTIFACT_REGISTRY_HOST}/trainer:${SHORT_SHA}
  - ${_ARTIFACT_REGISTRY_HOST}/execution-engine:${SHORT_SHA}

substitutions:
  _ARTIFACT_REGISTRY_HOST: "us-central1-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}"
  _ARTIFACT_REPO: "${_ARTIFACT_REPOSITORY}"
  _REGION: "us-central1"
  _CONNECTORS_SA: "connectors-sa@${PROJECT_ID}.iam.gserviceaccount.com"
  _DATAFLOW_BUCKET: "${PROJECT_ID}-dataflow-templates"
