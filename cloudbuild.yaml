steps:
  - name: gcr.io/cloud-builders/docker
    args: [
      "build",
      "-t",
      "$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA",
      "./portfolio_engine"
    ]

  - name: gcr.io/cloud-builders/docker
    args: [
      "push",
      "$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA"
    ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      "run",
      "deploy",
      "portfolio-engine",
      "--image=$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA",
      "--region=$REGION",
      "--platform=managed"
    ]

images:
  - "$REGION-docker.pkg.dev/$PROJECT_ID/portfolio/portfolio_engine:$COMMIT_SHA"